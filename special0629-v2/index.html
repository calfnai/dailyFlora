<!doctype html>
<html lang="zh-CN">
  <head>
    <base href="../" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DailyFlora creates a low-power 3D particle bouquet that changes every day."
    />
    <title>DailyFlora</title>
    <script type="module" crossorigin src="./assets/main-DkUsiwkL.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/floraPrimitives-DTeKYRlc.js">
    <link rel="stylesheet" crossorigin href="./assets/main-C5qFrSRw.css">
  </head>
  <body>
    <main class="app-shell" aria-label="DailyFlora 3D bouquet screensaver">
      <canvas id="flora-canvas"></canvas>

      <section class="hud" id="hud" aria-live="polite">
        <div class="daily-mark">
          <span class="daily-date" id="daily-date"></span>
          <span class="daily-theme" id="daily-theme">
            <span class="daily-theme-cn" id="daily-theme-cn"></span>
            <span class="daily-theme-en" id="daily-theme-en" lang="en"></span>
          </span>
          <span class="flower-plan-mark" id="flower-plan-mark"></span>
        </div>
        <div class="quality-mark" id="quality-mark"></div>
      </section>

      <section class="account-dock" id="account-dock" aria-label="Personal DailyFlora account">
        <button class="account-favorite-button" id="favorite-button" type="button" aria-pressed="false" title="收藏今日花束">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20.6l-1.1-1C5.7 15 2.5 12.1 2.5 8.5A5 5 0 0 1 7.6 3.4c1.7 0 3.3.8 4.4 2.1a5.7 5.7 0 0 1 4.4-2.1 5 5 0 0 1 5.1 5.1c0 3.6-3.2 6.5-8.4 11.1z" /></svg>
        </button>
        <button class="account-open-button" id="account-open-button" type="button" aria-expanded="false" aria-controls="account-panel">
          <span class="account-avatar" id="account-avatar">访</span>
          <span class="account-open-copy">
            <span id="account-open-title">个人花园</span>
            <span id="account-open-status">登录后同步收藏</span>
          </span>
        </button>
      </section>

      <aside class="account-panel" id="account-panel" aria-label="Personal collection" hidden>
        <div class="account-panel-header">
          <div>
            <p class="account-eyebrow">DailyFlora ID</p>
            <h2 id="account-panel-title">把今天的花束收进个人花园</h2>
          </div>
          <button class="account-close-button" id="account-close-button" type="button" aria-label="关闭个人花园">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.4 5 12 10.6 17.6 5 19 6.4 13.4 12 19 17.6 17.6 19 12 13.4 6.4 19 5 17.6 10.6 12 5 6.4z" /></svg>
          </button>
        </div>

        <form class="login-card" id="login-form">
          <label>
            <span>昵称</span>
            <input id="login-name-input" type="text" name="name" autocomplete="name" maxlength="18" placeholder="例如：小花" />
          </label>
          <label>
            <span>邮箱</span>
            <input id="login-email-input" type="email" name="email" autocomplete="email" placeholder="you@example.com" />
          </label>
          <button class="primary-action" type="submit">登录并保存收藏</button>
        </form>

        <div class="account-profile" id="account-profile" hidden>
          <div class="profile-card">
            <span class="profile-avatar" id="profile-avatar">花</span>
            <div>
              <strong id="profile-name">DailyFlora 用户</strong>
              <span id="profile-email"></span>
            </div>
            <button class="ghost-action" id="logout-button" type="button">退出</button>
          </div>
        </div>

        <section class="reference-card" aria-label="Upload reference bouquet">
          <div class="reference-copy">
            <p class="account-eyebrow">Reference</p>
            <h3>上传你的参考</h3>
            <p>用照片的色调和氛围生成一束 DailyFlora。</p>
          </div>
          <label class="reference-upload-zone" id="reference-upload-zone">
            <input id="reference-file-input" type="file" accept="image/*" />
            <span class="reference-upload-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M11 16V7.8l-3.1 3.1-1.4-1.4L12 4l5.5 5.5-1.4 1.4L13 7.8V16z" /><path d="M5 18h14v2H5z" /></svg>
            </span>
            <span id="reference-upload-text">选择参考图</span>
          </label>
          <div class="reference-preview" id="reference-preview" hidden>
            <img id="reference-preview-image" alt="上传的参考图预览" />
            <div>
              <strong id="reference-preview-title">参考图已载入</strong>
              <span id="reference-preview-meta"></span>
            </div>
          </div>
          <label class="reference-note-label">
            <span>偏好</span>
            <textarea id="reference-note-input" rows="2" maxlength="80" placeholder="例如：更清透、枝条外扩、不要太满"></textarea>
          </label>
          <button class="primary-action" id="reference-generate-button" type="button" disabled>生成这束花</button>
          <p class="reference-result" id="reference-result" hidden></p>
        </section>

        <div class="collection-section">
          <div class="collection-header">
            <div>
              <p class="account-eyebrow">Collection</p>
              <h3>我的收藏</h3>
            </div>
            <span class="collection-count" id="collection-count">0</span>
          </div>
          <div class="collection-list" id="collection-list"></div>
        </div>
      </aside>

      <nav class="controls is-collapsed" id="controls" aria-label="Viewing controls">
        <button class="icon-button controls-toggle" id="controls-toggle" type="button" title="Show viewing controls" aria-label="Show viewing controls" aria-expanded="false" aria-controls="controls-panel" data-tooltip="观看设置">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h9a3 3 0 0 0 5.83 1H20V6h-1.17A3 3 0 0 0 13 7H4zm0 11h3.17A3 3 0 0 0 13 17h7v-2h-7a3 3 0 0 0-5.83 1H4z" /></svg>
        </button>
        <a class="icon-button review-dashboard-button" id="review-dashboard-link" href="./docs/aesthetic-review-dashboard.html?debug=1" target="_blank" rel="noopener" title="Open aesthetic review dashboard" aria-label="Open aesthetic review dashboard" data-tooltip="审美审核" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm0 2v14h14V5z" /><path d="M7 8h10v2H7zM7 12h6v2H7zM15.4 13.6l1.4 1.4-3.6 3.6-2.2-2.2 1.4-1.4.8.8z" /></svg>
        </a>
        <div class="controls-panel" id="controls-panel" hidden>
          <span class="date-control">
            <button class="icon-button" id="today-button" type="button" title="Today" aria-label="Show today's bouquet" data-tooltip="选择日期">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h2v3H7zM15 2h2v3h-2z" /><path d="M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 6v9h14v-9z" /></svg>
            </button>
            <input class="date-picker" id="date-picker" type="date" aria-label="Pick bouquet date" />
          </span>
          <button class="icon-button" id="shuffle-button" type="button" title="Preview another seed" aria-label="Preview another seed" data-tooltip="随机跳到某一天">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 3h5v5h-2V6.5l-4.2 4.2-1.4-1.4L17.6 5H16zM4 7h3.4c1.6 0 3 .8 3.9 2.1l3.4 5c.5.7 1.3 1.1 2.1 1.1H21v2h-4.2c-1.6 0-3-.8-3.9-2.1l-3.4-5C9 9.4 8.2 9 7.4 9H4z" /><path d="M17.6 19l-4.2-4.3 1.4-1.4 4.2 4.2V16h2v5h-5v-2zM4 17h3.4c.8 0 1.6-.4 2.1-1.1l1-1.5 1.4 1.4-1 1.2c-.9 1.3-2.3 2-3.9 2H4z" /></svg>
          </button>
          <button class="icon-button" id="fullscreen-button" type="button" title="Fullscreen" aria-label="Fullscreen" data-tooltip="全屏观看">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v2H6v4H4zM14 4h6v6h-2V6h-4zM4 14h2v4h4v2H4zM18 18v-4h2v6h-6v-2z" /></svg>
          </button>
          <div class="zoom-control" aria-label="Zoom controls">
            <button class="icon-button compact-button" id="zoom-out-button" type="button" title="Zoom out" aria-label="Zoom out" data-tooltip="拉远">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 11h14v2H5z" /></svg>
            </button>
            <button class="icon-button compact-button" id="zoom-in-button" type="button" title="Zoom in" aria-label="Zoom in" data-tooltip="拉近">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6z" /></svg>
            </button>
          </div>
          <div class="segmented density-control" aria-label="Bouquet density">
            <button class="segment-button" type="button" data-density-choice="low" aria-pressed="false" title="Sparse bouquet" data-tooltip="花材少一点">疏</button>
            <button class="segment-button" type="button" data-density-choice="medium" aria-pressed="true" title="Medium bouquet" data-tooltip="花材中等">中</button>
            <button class="segment-button" type="button" data-density-choice="high" aria-pressed="false" title="Dense bouquet" data-tooltip="花材密一点">密</button>
          </div>
          <div class="segmented render-control" aria-label="Render precision">
            <button class="segment-button" type="button" data-render-choice="auto" aria-pressed="true" title="Auto render" data-tooltip="自动选择清晰度">自</button>
            <button class="segment-button" type="button" data-render-choice="low" aria-pressed="false" title="Low render" data-tooltip="省电模式">省</button>
            <button class="segment-button" type="button" data-render-choice="medium" aria-pressed="false" title="Medium render" data-tooltip="80%透明光滑球">清</button>
            <button class="segment-button" type="button" data-render-choice="high" aria-pressed="false" title="High render" data-tooltip="精细模式">精</button>
          </div>
          <div class="rotation-control" aria-label="Camera route">
            <button class="icon-button compact-button" id="pause-button" type="button" title="Pause rotation" aria-label="Pause rotation" data-tooltip="暂停 / 继续旋转">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5h3v14H8zM13 5h3v14h-3z" /></svg>
            </button>
            <button class="icon-button compact-button" id="rotation-direction-button" type="button" title="Reverse current camera route" aria-label="Reverse current camera route" data-tooltip="反转当前镜头路线">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4a8 8 0 1 1-7.2 4.5l1.8.9A6 6 0 1 0 12 6H8.8l2.6 2.6L10 10 5 5l5-5 1.4 1.4L8.8 4z" /></svg>
            </button>
            <label class="slider-shell" data-tooltip="镜头速度">
              <span class="sr-only">Camera route speed</span>
              <input class="rotation-slider" id="rotation-speed" type="range" min="0" max="100" value="45" aria-label="Camera route speed" />
            </label>
            <button class="icon-button compact-button" id="rotation-preset-button" type="button" title="Random camera route preset" aria-label="Random camera route preset" data-tooltip="随机镜头预设">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l1.4 5.1L18 4.6l-2.4 4.7 5.1 1.4-5.1 1.4 2.4 4.7-4.6-2.5L12 19.4l-1.4-5.1L6 16.8l2.4-4.7-5.1-1.4 5.1-1.4L6 4.6l4.6 2.5z" /></svg>
            </button>
          </div>
        </div>
      </nav>
      <aside class="debug-panel" id="debug-panel" aria-label="Debug rendering stats" hidden></aside>
    </main>
  </body>
</html>
