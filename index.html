<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DailyFlora creates a low-power 3D particle bouquet that changes every day."
    />
    <title>DailyFlora</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const pathname = window.location.pathname.replace(/\/+$/, '');
        const isSpecial = /\/special[^/]*$/i.test(pathname) || params.has('special');
        if (isSpecial) return;

        document.documentElement.classList.add('df-gui-v1');
        const languageStorageKey = 'dailyflora.gui-language.v4';
        const supportedLanguages = ['en', 'zh', 'es', 'fr', 'it', 'ja'];
        let language = 'en';
        try {
          const storedLanguage = window.localStorage.getItem(languageStorageKey);
          if (supportedLanguages.includes(storedLanguage)) language = storedLanguage;
        } catch {}
        document.documentElement.dataset.language = language;
        document.documentElement.lang = language === 'zh' ? 'zh-CN' : language;
      })();
    </script>
    <link rel="stylesheet" href="https://fontsapi.zeoseven.com/159/main/result.css" />
    <link rel="stylesheet" href="/src/gui-v1.css" />
    <link rel="stylesheet" href="/src/gui-v1-safety.css" />
    <link rel="stylesheet" href="/src/gui-v2.css" />
    <link rel="stylesheet" href="/src/gui-v3-corrections.css" />
    <link rel="stylesheet" href="/src/gui-v5-frame-restore.css" />
    <link rel="stylesheet" href="/src/gui-v6-sarasa-i18n-frame.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="DailyFlora 3D bouquet screensaver">
      <canvas id="flora-canvas"></canvas>

      <header class="brand-lockup" aria-label="DailyFlora">
        <span class="brand-wordmark">DAILYFLORA</span>
        <span class="brand-meta" aria-hidden="true">
          <span data-ui-key="brandSystem">GENERATIVE BOTANICAL SYSTEM</span>
          <span>DF / 014</span>
        </span>
      </header>

      <div class="interface-frame" aria-hidden="true"></div>

      <div class="language-toggle global-language-toggle" role="group" aria-label="Interface language">
        <button type="button" data-language-choice="en" aria-pressed="true" title="English" aria-label="English">EN</button>
        <button type="button" data-language-choice="zh" aria-pressed="false" title="中文" aria-label="中文">中</button>
        <button type="button" data-language-choice="es" aria-pressed="false" title="Español" aria-label="Español">ES</button>
        <button type="button" data-language-choice="fr" aria-pressed="false" title="Français" aria-label="Français">FR</button>
        <button type="button" data-language-choice="it" aria-pressed="false" title="Italiano" aria-label="Italiano">IT</button>
        <button type="button" data-language-choice="ja" aria-pressed="false" title="日本語" aria-label="日本語">日</button>
      </div>

      <section class="hud" id="hud" aria-live="polite">
        <div class="daily-mark">
          <span class="daily-kicker" data-ui-key="kicker">TODAY'S COMPOSITION</span>
          <span class="daily-date" id="daily-date"></span>
          <span class="daily-theme" id="daily-theme">
            <span class="daily-theme-cn" id="daily-theme-cn" lang="zh-CN"></span>
            <span class="daily-theme-en" id="daily-theme-en" lang="en"></span>
          </span>
          <span class="flower-plan-mark flower-plan-mark-cn" id="flower-plan-mark"></span>
          <span class="flower-plan-mark flower-plan-mark-en" id="flower-plan-mark-en" lang="en"></span>
        </div>
        <div class="quality-mark" id="quality-mark"></div>
      </section>

      <nav class="site-menu" id="site-menu" aria-label="DailyFlora site menu">
        <button class="site-menu-toggle" id="site-menu-toggle" type="button" aria-label="Open site index" aria-expanded="false" aria-controls="site-menu-panel" data-tooltip="菜单">
          <span class="site-menu-label" data-ui-key="index">INDEX</span>
          <svg class="site-menu-legacy-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v2H4zM4 11h16v2H4zM4 16h16v2H4z" /></svg>
        </button>
        <div class="site-menu-panel" id="site-menu-panel" hidden>
          <div class="site-menu-heading" data-ui-key="menuHeading">DAILYFLORA / INDEX</div>
          <a href="./about/" data-ui-key="about">About</a>
          <a href="./member/" data-ui-key="member">Member</a>
          <a href="./downloads/" data-ui-key="downloads">Downloads</a>
          <a href="./bouquet-shop/" data-ui-key="shop">Bouquet Shop</a>
          <a href="./scifi/" data-ui-key="scifi">SciFi Flora</a>
          <a class="site-menu-primary" href="./signup/" data-ui-key="save">Save This Bouquet</a>
          <a id="site-menu-debug-link" href="./docs/aesthetic-review-dashboard.html?debug=1" data-ui-key="review" hidden>Aesthetic Review</a>
        </div>
      </nav>

      <nav class="controls is-collapsed" id="controls" aria-label="Viewing controls">
        <button class="icon-button controls-toggle" id="controls-toggle" type="button" title="Show viewing controls" aria-label="Show viewing controls" aria-expanded="false" aria-controls="controls-panel" data-tooltip="观看设置">
          <span class="controls-label" data-ui-key="view">VIEW</span>
          <svg class="controls-legacy-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h9a3 3 0 0 0 5.83 1H20V6h-1.17A3 3 0 0 0 13 7H4zm0 11h3.17A3 3 0 0 0 13 17h7v-2h-7a3 3 0 0 0-5.83 1H4z" /></svg>
        </button>
        <a class="icon-button review-dashboard-button" id="review-dashboard-link" href="./docs/aesthetic-review-dashboard.html?debug=1" target="_blank" rel="noopener" title="Open aesthetic review dashboard" aria-label="Open aesthetic review dashboard" data-tooltip="审美审核" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm0 2v14h14V5z" /><path d="M7 8h10v2H7zM7 12h6v2H7zM15.4 13.6l1.4 1.4-3.6 3.6-2.2-2.2 1.4-1.4.8.8z" /></svg>
        </a>
        <div class="controls-panel" id="controls-panel" hidden>
          <span class="date-control">
            <button class="icon-button" id="today-button" type="button" title="Today" aria-label="Show today's bouquet" data-tooltip="选择日期">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h2v3H7zM15 2h2v3h-2z" /><path d="M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 6v9h14v-9z" /></svg>
            </button>
            <input class="date-picker" id="date-picker" type="date" aria-label="Pick bouquet date" />
          </span>
          <button class="icon-button" id="shuffle-button" type="button" title="Preview another seed" aria-label="Preview another seed" data-tooltip="随机跳到某一天">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 3h5v5h-2V6.5l-4.2 4.2-1.4-1.4L17.6 5H16zM4 7h3.4c1.6 0 3 .8 3.9 2.1l3.4 5c.5.7 1.3 1.1 2.1 1.1H21v2h-4.2c-1.6 0-3-.8-3.9-2.1l-3.4-5C9 9.4 8.2 9 7.4 9H4z" /><path d="M17.6 19l-4.2-4.3 1.4-1.4 4.2 4.2V16h2v5h-5v-2zM4 17h3.4c.8 0 1.6-.4 2.1-1.1l1-1.5 1.4 1.4-1 1.2c-.9 1.3-2.3 2-3.9 2H4z" /></svg>
          </button>
          <button class="icon-button" id="fullscreen-button" type="button" title="Fullscreen" aria-label="Fullscreen" data-tooltip="全屏观看">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v2H6v4H4zM14 4h6v6h-2V6h-4zM4 14h2v4h4v2H4zM18 18v-4h2v6h-6v-2z" /></svg>
          </button>
          <div class="zoom-control" aria-label="Zoom controls">
            <button class="icon-button compact-button" id="zoom-out-button" type="button" title="Zoom out" aria-label="Zoom out" data-tooltip="拉远">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 11h14v2H5z" /></svg>
            </button>
            <button class="icon-button compact-button" id="zoom-in-button" type="button" title="Zoom in" aria-label="Zoom in" data-tooltip="拉近">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6z" /></svg>
            </button>
          </div>
          <div class="segmented density-control" aria-label="Bouquet density">
            <button class="segment-button" type="button" data-density-choice="low" aria-pressed="false" title="Sparse bouquet" data-tooltip="花材少一点">LO</button>
            <button class="segment-button" type="button" data-density-choice="medium" aria-pressed="true" title="Medium bouquet" data-tooltip="花材中等">MID</button>
            <button class="segment-button" type="button" data-density-choice="high" aria-pressed="false" title="Dense bouquet" data-tooltip="花材密一点">HI</button>
          </div>
          <div class="segmented render-control" aria-label="Render precision">
            <button class="segment-button" type="button" data-render-choice="auto" aria-pressed="true" title="Auto render" data-tooltip="自动选择清晰度">AUTO</button>
            <button class="segment-button" type="button" data-render-choice="low" aria-pressed="false" title="Low render" data-tooltip="省电模式">ECO</button>
            <button class="segment-button" type="button" data-render-choice="medium" aria-pressed="false" title="Medium render" data-tooltip="80%透明光滑球">CLR</button>
            <button class="segment-button" type="button" data-render-choice="high" aria-pressed="false" title="High render" data-tooltip="精细模式">MAX</button>
          </div>
          <div class="rotation-control" aria-label="Camera route">
            <button class="icon-button compact-button" id="pause-button" type="button" title="Pause rotation" aria-label="Pause rotation" data-tooltip="暂停 / 继续旋转">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5h3v14H8zM13 5h3v14h-3z" /></svg>
            </button>
            <button class="icon-button compact-button" id="rotation-direction-button" type="button" title="Reverse current camera route" aria-label="Reverse current camera route" data-tooltip="反转当前镜头路线">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4a8 8 0 1 1-7.2 4.5l1.8.9A6 6 0 1 0 12 6H8.8l2.6 2.6L10 10 5 5l5-5 1.4 1.4L8.8 4z" /></svg>
            </button>
            <label class="slider-shell" data-tooltip="镜头速度">
              <span class="sr-only">Camera route speed</span>
              <input class="rotation-slider" id="rotation-speed" type="range" min="0" max="100" value="45" aria-label="Camera route speed" />
            </label>
            <button class="icon-button compact-button" id="rotation-preset-button" type="button" title="Random camera route preset" aria-label="Random camera route preset" data-tooltip="随机镜头预设">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l1.4 5.1L18 4.6l-2.4 4.7 5.1 1.4-5.1 1.4 2.4 4.7-4.6-2.5L12 19.4l-1.4-5.1L6 16.8l2.4-4.7-5.1-1.4 5.1-1.4L6 4.6l4.6 2.5z" /></svg>
            </button>
          </div>
        </div>
      </nav>
      <aside class="debug-panel" id="debug-panel" aria-label="Debug rendering stats" hidden></aside>
    </main>
    <script type="module" src="/src/gui-v2.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
