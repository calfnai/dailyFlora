<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DailyFlora creates a low-power 3D particle bouquet that changes every day."
    />
    <title>DailyFlora</title>
  </head>
  <body>
    <main class="app-shell" aria-label="DailyFlora 3D bouquet screensaver">
      <canvas id="flora-canvas"></canvas>

      <section class="hud" id="hud" aria-live="polite">
        <div class="daily-mark">
          <span class="daily-date" id="daily-date"></span>
          <span class="daily-theme" id="daily-theme"></span>
        </div>
        <div class="quality-mark" id="quality-mark"></div>
      </section>

      <nav class="controls" id="controls" aria-label="Viewing controls">
        <button class="icon-button" id="pause-button" type="button" title="Pause rotation" aria-label="Pause rotation">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5h3v14H8zM13 5h3v14h-3z" /></svg>
        </button>
        <button class="icon-button" id="today-button" type="button" title="Today" aria-label="Show today's bouquet">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h2v3H7zM15 2h2v3h-2z" /><path d="M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 6v9h14v-9z" /></svg>
        </button>
        <input class="date-picker" id="date-picker" type="date" aria-label="Pick bouquet date" />
        <button class="icon-button" id="shuffle-button" type="button" title="Preview another seed" aria-label="Preview another seed">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 3h5v5h-2V6.5l-4.2 4.2-1.4-1.4L17.6 5H16zM4 7h3.4c1.6 0 3 .8 3.9 2.1l3.4 5c.5.7 1.3 1.1 2.1 1.1H21v2h-4.2c-1.6 0-3-.8-3.9-2.1l-3.4-5C9 9.4 8.2 9 7.4 9H4z" /><path d="M17.6 19l-4.2-4.3 1.4-1.4 4.2 4.2V16h2v5h-5v-2zM4 17h3.4c.8 0 1.6-.4 2.1-1.1l1-1.5 1.4 1.4-1 1.2c-.9 1.3-2.3 2-3.9 2H4z" /></svg>
        </button>
        <button class="icon-button" id="fullscreen-button" type="button" title="Fullscreen" aria-label="Fullscreen">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v2H6v4H4zM14 4h6v6h-2V6h-4zM4 14h2v4h4v2H4zM18 18v-4h2v6h-6v-2z" /></svg>
        </button>
        <div class="segmented density-control" aria-label="Bouquet density">
          <button class="segment-button" type="button" data-density-choice="low" aria-pressed="false" title="Sparse bouquet">疏</button>
          <button class="segment-button" type="button" data-density-choice="medium" aria-pressed="true" title="Medium bouquet">中</button>
          <button class="segment-button" type="button" data-density-choice="high" aria-pressed="false" title="Dense bouquet">密</button>
        </div>
        <div class="segmented render-control" aria-label="Render precision">
          <button class="segment-button" type="button" data-render-choice="auto" aria-pressed="true" title="Auto render">自</button>
          <button class="segment-button" type="button" data-render-choice="low" aria-pressed="false" title="Low render">省</button>
          <button class="segment-button" type="button" data-render-choice="medium" aria-pressed="false" title="Medium render">清</button>
          <button class="segment-button" type="button" data-render-choice="high" aria-pressed="false" title="High render">精</button>
        </div>
        <div class="rotation-control" aria-label="Camera route">
          <button class="icon-button compact-button" id="rotation-direction-button" type="button" title="Random camera route" aria-label="Random camera route">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4a8 8 0 1 1-7.2 4.5l1.8.9A6 6 0 1 0 12 6H8.8l2.6 2.6L10 10 5 5l5-5 1.4 1.4L8.8 4z" /></svg>
          </button>
          <input class="rotation-slider" id="rotation-speed" type="range" min="0" max="100" value="45" aria-label="Camera route speed" />
          <button class="icon-button compact-button" id="rotation-preset-button" type="button" title="Camera route preset" aria-label="Camera route preset">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l1.4 5.1L18 4.6l-2.4 4.7 5.1 1.4-5.1 1.4 2.4 4.7-4.6-2.5L12 19.4l-1.4-5.1L6 16.8l2.4-4.7-5.1-1.4 5.1-1.4L6 4.6l4.6 2.5z" /></svg>
          </button>
        </div>
      </nav>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
