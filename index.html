<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DailyFlora creates a low-power 3D particle bouquet that changes every day."
    />
    <title>DailyFlora</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const pathname = window.location.pathname.replace(/\/+$/, '');
        const isSpecial = /\/special[^/]*$/i.test(pathname) || params.has('special');
        if (isSpecial) return;

        document.documentElement.classList.add('df-gui-v1');
        const languageStorageKey = 'dailyflora.gui-language.v3';
        let language = 'zh';
        try {
          const storedLanguage = window.localStorage.getItem(languageStorageKey);
          if (storedLanguage === 'zh' || storedLanguage === 'en') language = storedLanguage;
        } catch {}
        document.documentElement.dataset.language = language;
        document.documentElement.lang = language === 'zh' ? 'zh-CN' : 'en';
      })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xz/fonts@1/serve/ibm-plex-mono.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ibm/plex-sans-sc@1.1.0/css/ibm-plex-sans-sc.css" />
    <link rel="stylesheet" href="/src/gui-v1.css" />
    <link rel="stylesheet" href="/src/gui-v1-safety.css" />
    <link rel="stylesheet" href="/src/gui-v2.css" />
    <link rel="stylesheet" href="/src/gui-v3-corrections.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="DailyFlora 3D bouquet screensaver">
      <canvas id="flora-canvas"></canvas>

      <header class="brand-lockup" aria-label="DailyFlora">
        <span class="brand-wordmark">DAILYFLORA</span>
        <span class="brand-meta" aria-hidden="true">
          <span data-ui-key="brandSystem">生成式植物系统</span>
          <span>DF / 014</span>
        </span>
      </header>

      <div class="language-toggle global-language-toggle" role="group" aria-label="界面语言">
        <button type="button" data-language-choice="zh" aria-pressed="true">中文</button>
        <button type="button" data-language-choice="en" aria-pressed="false">EN</button>
      </div>

      <section class="hud" id="hud" aria-live="polite">
        <div class="daily-mark">
          <span class="daily-kicker" data-ui-key="kicker">今日花束</span>
          <span class="daily-date" id="daily-date"></span>
          <span class="daily-theme" id="daily-theme">
            <span class="daily-theme-cn" id="daily-theme-cn" lang="zh-CN"></span>
            <span class="daily-theme-en" id="daily-theme-en" lang="en"></span>
          </span>
          <span class="flower-plan-mark flower-plan-mark-cn" id="flower-plan-mark"></span>
          <span class="flower-plan-mark flower-plan-mark-en" id="flower-plan-mark-en" lang="en"></span>
        </div>
        <div class="quality-mark" id="quality-mark"></div>
      </section>

      <nav class="site-menu" id="site-menu" aria-label="站点目录">
        <button class="site-menu-toggle" id="site-menu-toggle" type="button" aria-label="打开站点目录" aria-expanded="false" aria-controls="site-menu-panel" data-tooltip="目录">
          <span class="site-menu-label" data-ui-key="index">目录</span>
        </button>
        <div class="site-menu-panel" id="site-menu-panel" hidden>
          <div class="site-menu-heading" data-ui-key="menuHeading">DAILYFLORA / 目录</div>
          <a href="./about/" data-ui-key="about">关于</a>
          <a href="./member/" data-ui-key="member">个人花园</a>
          <a href="./downloads/" data-ui-key="downloads">下载</a>
          <a href="./bouquet-shop/" data-ui-key="shop">花束商店</a>
          <a href="./scifi/" data-ui-key="scifi">科幻花束</a>
          <a class="site-menu-primary" href="./signup/" data-ui-key="save">收藏这束花</a>
          <a id="site-menu-debug-link" href="./docs/aesthetic-review-dashboard.html?debug=1" data-ui-key="review" hidden>审美审核</a>
        </div>
      </nav>

      <nav class="controls is-collapsed" id="controls" aria-label="观看控制">
        <button class="icon-button controls-toggle" id="controls-toggle" type="button" title="显示观看控制" aria-label="显示观看控制" aria-expanded="false" aria-controls="controls-panel" data-tooltip="观看">
          <span class="controls-label" data-ui-key="view">观看</span>
        </button>
        <a class="icon-button review-dashboard-button" id="review-dashboard-link" href="./docs/aesthetic-review-dashboard.html?debug=1" target="_blank" rel="noopener" title="打开审美审核" aria-label="打开审美审核" data-tooltip="审美审核" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm0 2v14h14V5z" /><path d="M7 8h10v2H7zM7 12h6v2H7zM15.4 13.6l1.4 1.4-3.6 3.6-2.2-2.2 1.4-1.4.8.8z" /></svg>
        </a>
        <div class="controls-panel" id="controls-panel" hidden>
          <span class="date-control">
            <button class="icon-button" id="today-button" type="button" title="选择日期" aria-label="选择花束日期" data-tooltip="选择日期">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h2v3H7zM15 2h2v3h-2z" /><path d="M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 6v9h14v-9z" /></svg>
            </button>
            <input class="date-picker" id="date-picker" type="date" aria-label="选择花束日期" />
          </span>
          <button class="icon-button" id="shuffle-button" type="button" title="随机已有日期" aria-label="随机已有日期花束" data-tooltip="随机已有日期">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 3h5v5h-2V6.5l-4.2 4.2-1.4-1.4L17.6 5H16zM4 7h3.4c1.6 0 3 .8 3.9 2.1l3.4 5c.5.7 1.3 1.1 2.1 1.1H21v2h-4.2c-1.6 0-3-.8-3.9-2.1l-3.4-5C9 9.4 8.2 9 7.4 9H4z" /><path d="M17.6 19l-4.2-4.3 1.4-1.4 4.2 4.2V16h2v5h-5v-2zM4 17h3.4c.8 0 1.6-.4 2.1-1.1l1-1.5 1.4 1.4-1 1.2c-.9 1.3-2.3 2-3.9 2H4z" /></svg>
          </button>
          <button class="icon-button" id="fullscreen-button" type="button" title="全屏观看" aria-label="全屏观看" data-tooltip="全屏观看">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v2H6v4H4zM14 4h6v6h-2V6h-4zM4 14h2v4h4v2H4zM18 18v-4h2v6h-6v-2z" /></svg>
          </button>
          <div class="zoom-control" aria-label="缩放控制">
            <button class="icon-button compact-button" id="zoom-out-button" type="button" title="拉远" aria-label="拉远" data-tooltip="拉远">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 11h14v2H5z" /></svg>
            </button>
            <button class="icon-button compact-button" id="zoom-in-button" type="button" title="拉近" aria-label="拉近" data-tooltip="拉近">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6z" /></svg>
            </button>
          </div>
          <div class="segmented density-control" aria-label="花束密度">
            <button class="segment-button" type="button" data-density-choice="low" aria-pressed="false" title="花材少一点" data-tooltip="花材少一点">疏</button>
            <button class="segment-button" type="button" data-density-choice="medium" aria-pressed="true" title="花材中等" data-tooltip="花材中等">中</button>
            <button class="segment-button" type="button" data-density-choice="high" aria-pressed="false" title="花材密一点" data-tooltip="花材密一点">密</button>
          </div>
          <div class="segmented render-control" aria-label="渲染精度">
            <button class="segment-button" type="button" data-render-choice="auto" aria-pressed="true" title="自动选择清晰度" data-tooltip="自动选择清晰度">自</button>
            <button class="segment-button" type="button" data-render-choice="low" aria-pressed="false" title="省电模式" data-tooltip="省电模式">省</button>
            <button class="segment-button" type="button" data-render-choice="medium" aria-pressed="false" title="清晰模式" data-tooltip="清晰模式">清</button>
            <button class="segment-button" type="button" data-render-choice="high" aria-pressed="false" title="精细模式" data-tooltip="精细模式">精</button>
          </div>
          <div class="rotation-control" aria-label="镜头路线">
            <button class="icon-button compact-button" id="pause-button" type="button" title="暂停或继续旋转" aria-label="暂停或继续旋转" data-tooltip="暂停 / 继续旋转">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5h3v14H8zM13 5h3v14h-3z" /></svg>
            </button>
            <button class="icon-button compact-button" id="rotation-direction-button" type="button" title="反转当前镜头路线" aria-label="反转当前镜头路线" data-tooltip="反转镜头路线">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4a8 8 0 1 1-7.2 4.5l1.8.9A6 6 0 1 0 12 6H8.8l2.6 2.6L10 10 5 5l5-5 1.4 1.4L8.8 4z" /></svg>
            </button>
            <label class="slider-shell" data-tooltip="镜头速度">
              <span class="sr-only">镜头速度</span>
              <input class="rotation-slider" id="rotation-speed" type="range" min="0" max="100" value="45" aria-label="镜头速度" />
            </label>
            <button class="icon-button compact-button" id="rotation-preset-button" type="button" title="随机镜头预设" aria-label="随机镜头预设" data-tooltip="随机镜头预设">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l1.4 5.1L18 4.6l-2.4 4.7 5.1 1.4-5.1 1.4 2.4 4.7-4.6-2.5L12 19.4l-1.4-5.1L6 16.8l2.4-4.7-5.1-1.4 5.1-1.4L6 4.6l4.6 2.5z" /></svg>
            </button>
          </div>
        </div>
      </nav>
      <aside class="debug-panel" id="debug-panel" aria-label="Debug rendering stats" hidden></aside>
    </main>
    <script type="module" src="/src/gui-v2.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
