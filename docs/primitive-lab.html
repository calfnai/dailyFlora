<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DailyFlora Primitive Lab</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070907;
        --text: #f8f0df;
        --muted: rgb(248 240 223 / 68%);
        --line: rgb(248 240 223 / 16%);
        --panel: rgb(12 17 12 / 86%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 0%, rgb(255 210 94 / 12%), transparent 28%),
          radial-gradient(circle at 88% 12%, rgb(105 184 143 / 10%), transparent 30%),
          var(--bg);
      }

      .shell {
        display: grid;
        grid-template-rows: auto 1fr;
        width: 100vw;
        height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px 12px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, rgb(7 9 7 / 92%), rgb(7 9 7 / 64%));
      }

      h1 {
        margin: 0;
        font-size: clamp(20px, 2.5vw, 34px);
        letter-spacing: 0;
      }

      p {
        max-width: 76ch;
        margin: 6px 0 0;
        color: var(--muted);
        line-height: 1.5;
        font-size: 14px;
      }

      .tools {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 8px;
        max-width: 520px;
      }

      button,
      select,
      output {
        flex: 0 0 auto;
        min-height: 36px;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: var(--panel);
        font: inherit;
        font-size: 13px;
      }

      button,
      select {
        cursor: pointer;
      }

      output {
        display: inline-flex;
        align-items: center;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      #primitive-review {
        position: absolute;
        top: 18px;
        left: 18px;
        z-index: 2;
        max-width: min(380px, calc(100% - 36px));
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgb(8 11 8 / 78%);
        color: var(--text);
        pointer-events: none;
      }

      #primitive-review strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      #primitive-review span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .stage {
        position: relative;
        min-height: 0;
      }

      #primitive-canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: grab;
      }

      #primitive-canvas:active {
        cursor: grabbing;
      }

      #primitive-labels {
        position: absolute;
        inset: auto 24px 24px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        pointer-events: none;
      }

      .primitive-label {
        min-width: 0;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: rgb(248 240 223 / 86%);
        background: rgb(8 11 8 / 72%);
        text-align: center;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      #primitive-labels.is-hidden {
        display: none;
      }

      @media (max-width: 720px) {
        body {
          overflow: auto;
        }

        .shell {
          min-height: 100vh;
          height: 760px;
        }

        header {
          align-items: flex-start;
          flex-direction: column;
        }

        #primitive-labels {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          inset: auto 12px 12px;
        }
      }
    </style>
    <script type="module" crossorigin src="../assets/primitiveLab-D8dQhEuf.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/floraPrimitives-xXqEQ7N8.js">
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>DailyFlora Primitive Lab</h1>
          <p>15 类花材/叶材 primitive 已达到本轮花库验收及格线。下一阶段可以把它们用于整束 composition 验证；后续主视觉修改仍要同步 dashboard。</p>
        </div>
        <div class="tools" aria-label="Primitive lab controls">
          <select id="isolate-primitive" aria-label="Isolate primitive"></select>
          <button type="button" data-view="front">正面</button>
          <button type="button" data-view="side">侧面</button>
          <button type="button" data-view="top">顶视</button>
          <button id="silhouette-button" type="button" aria-pressed="false">轮廓</button>
          <button id="grid-button" type="button" aria-pressed="true">网格</button>
          <button id="toggle-labels" type="button" aria-pressed="false">标签</button>
          <output id="primitive-stats" aria-label="Performance stats">draw 0 · tri 0 · pts 0</output>
        </div>
      </header>
      <section class="stage" aria-label="Floral primitive test scene">
        <canvas id="primitive-canvas"></canvas>
        <div id="primitive-review" aria-live="polite"></div>
        <div id="primitive-labels"></div>
      </section>
    </main>
  </body>
</html>
