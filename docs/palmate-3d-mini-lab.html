<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DailyFlora Palmate 3D Mini Lab</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        color: #e8f4dd;
        background: #10160f;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #palmate-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      .panel {
        position: fixed;
        left: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        max-width: min(760px, calc(100vw - 24px));
        padding: 8px;
        border: 1px solid rgb(190 235 170 / 24%);
        border-radius: 8px;
        background: rgb(4 10 4 / 72%);
        backdrop-filter: blur(8px);
      }

      #view-panel {
        top: 12px;
      }

      #mode-panel {
        top: 62px;
      }

      button {
        appearance: none;
        border: 1px solid rgb(190 235 170 / 30%);
        border-radius: 5px;
        padding: 6px 8px;
        color: #dff3d4;
        background: rgb(94 143 78 / 22%);
        font: 700 11px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        cursor: pointer;
      }

      button[aria-pressed="true"] {
        color: #071007;
        background: #b3e68f;
      }

      #info {
        position: fixed;
        right: 12px;
        bottom: 12px;
        width: min(440px, calc(100vw - 24px));
        margin: 0;
        padding: 10px 12px;
        border: 1px solid rgb(190 235 170 / 24%);
        border-radius: 8px;
        color: #dff3d4;
        background: rgb(4 10 4 / 72%);
        font: 11px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
      }
    </style>
    <script type="module" crossorigin src="../assets/palmate3DMiniLab-CgVKQ5I3.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="../assets/three.module-DQjliVUS.js">
  </head>
  <body>
    <canvas id="palmate-canvas"></canvas>
    <nav id="view-panel" class="panel" aria-label="Palmate 3D view">
      <button type="button" data-view="front">front</button>
      <button type="button" data-view="side">side</button>
      <button type="button" data-view="top">top</button>
      <button type="button" data-view="perspective">perspective</button>
      <button type="button" data-view="section">section</button>
    </nav>
    <nav id="mode-panel" class="panel" aria-label="Palmate 3D material mode">
      <button type="button" data-mode="normal">normal</button>
      <button type="button" data-mode="silhouette">silhouette</button>
      <button type="button" data-mode="wireframe">wireframe</button>
    </nav>
    <pre id="info"></pre>
  </body>
</html>
