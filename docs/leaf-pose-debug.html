<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DailyFlora Leaf Pose Debug</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #10170f;
      }

      #flora-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      #leaf-pose-stats {
        position: fixed;
        left: 12px;
        bottom: 12px;
        margin: 0;
        padding: 8px 10px;
        color: #dff5dc;
        background: rgb(5 12 6 / 72%);
        border: 1px solid rgb(180 235 174 / 24%);
        border-radius: 6px;
        font: 11px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
        max-height: 48vh;
        overflow: auto;
      }

      #leaf-mode-panel,
      #leaf-prototype-panel {
        position: fixed;
        top: 12px;
        left: 12px;
        display: flex;
        gap: 6px;
        padding: 8px;
        background: rgb(5 12 6 / 72%);
        border: 1px solid rgb(180 235 174 / 24%);
        border-radius: 6px;
      }

      #leaf-prototype-panel {
        top: 58px;
      }

      #leaf-mode-panel button,
      #leaf-prototype-panel button {
        appearance: none;
        border: 1px solid rgb(180 235 174 / 28%);
        border-radius: 4px;
        padding: 5px 7px;
        color: #dff5dc;
        background: rgb(95 164 95 / 18%);
        font: 11px/1.1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        cursor: pointer;
      }

      #leaf-mode-panel button[aria-pressed="true"],
      #leaf-prototype-panel button[aria-pressed="true"] {
        color: #071007;
        background: #9edc82;
      }
    </style>
  </head>
  <body>
    <canvas id="flora-canvas"></canvas>
    <div id="leaf-mode-panel" aria-label="Leaf material mode">
      <button type="button" data-leaf-mode="normal">normal</button>
      <button type="button" data-leaf-mode="monochrome">monochrome</button>
      <button type="button" data-leaf-mode="silhouette">silhouette</button>
      <button type="button" data-leaf-mode="front">front</button>
      <button type="button" data-leaf-mode="back">back</button>
      <button type="button" data-leaf-mode="wireframe">wireframe</button>
    </div>
    <div id="leaf-prototype-panel" aria-label="Leaf ownership specimen">
      <button type="button" data-leaf-prototype="strap">strap stem</button>
      <button type="button" data-leaf-prototype="lanceolate">lanceolate stem</button>
      <button type="button" data-leaf-prototype="ovate">ovate stem</button>
      <button type="button" data-leaf-prototype="palmate">palmate stem</button>
      <button type="button" data-leaf-prototype="compound">compound stem</button>
      <button type="button" data-leaf-comparison>multi-stem comparison</button>
    </div>
    <pre id="leaf-pose-stats"></pre>
    <script type="module" src="/src/leafPoseDebug.ts"></script>
  </body>
</html>
