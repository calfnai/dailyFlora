<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DailyFlora Downloads</title>
    <style>
      :root { color-scheme: dark; --bg: #080a07; --text: #f7f0e3; --muted: rgb(247 240 227 / 68%); --line: rgb(247 240 227 / 14%); --accent: #f2cb62; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); background: linear-gradient(180deg, #080a07, #0d110c); }
      main { width: min(980px, 100%); margin: 0 auto; padding: 34px 20px 56px; }
      h1, h2, p { margin: 0; }
      h1 { font-size: clamp(40px, 8vw, 86px); line-height: .96; letter-spacing: 0; }
      h2 { font-size: 18px; }
      p { color: var(--muted); line-height: 1.7; }
      .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-top: 22px; }
      .card { display: grid; gap: 8px; padding: 15px; border: 1px solid var(--line); border-radius: 8px; background: rgb(17 22 15 / 78%); }
      a { color: var(--accent); }
      @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <p>Downloads</p>
      <h1>下载敬请期待</h1>
      <p>客户端暂不开放下载。这里先保留未来 iOS、macOS、Android APK 和电视 APK 的客户入口。</p>
      <section class="grid">
        <article class="card"><h2>iOS</h2><p>规划中</p></article>
        <article class="card"><h2>macOS</h2><p>规划中</p></article>
        <article class="card"><h2>Android APK</h2><p>规划中</p></article>
        <article class="card"><h2>TV APK</h2><p>规划中</p></article>
      </section>
      <p style="margin-top:22px"><a href="../">回到首页</a> · <a href="../docs/dev-index.html">开发组目录</a></p>
    </main>
  </body>
</html>
