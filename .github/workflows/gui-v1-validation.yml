name: GUI v1 validation

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - src/gui-v1.css
      - src/gui-v1-safety.css
      - .github/workflows/gui-v1-validation.yml
  push:
    branches:
      - agent/gui-dark-editorial-v1
    paths:
      - index.html
      - src/gui-v1.css
      - src/gui-v1-safety.css
      - .github/workflows/gui-v1-validation.yml

permissions:
  contents: read

jobs:
  build-and-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Record current source build status
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Prepare isolated GitHub Pages preview
        shell: bash
        run: |
          git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages
          git worktree add --detach /tmp/dailyflora-gh-pages refs/remotes/origin/gh-pages
          cp -a /tmp/dailyflora-gh-pages/ui-v1 /tmp/dailyflora-gh-pages/ui-v1-special
          sed -i 's/<html lang="zh-CN" class="df-gui-v1">/<html lang="zh-CN">/' /tmp/dailyflora-gh-pages/ui-v1-special/index.html
          mkdir -p /tmp/dailyflora-site-root
          ln -s /tmp/dailyflora-gh-pages /tmp/dailyflora-site-root/dailyFlora

      - name: Start static preview server
        run: |
          python3 -m http.server 4173 --directory /tmp/dailyflora-site-root > /tmp/dailyflora-preview.log 2>&1 &
          echo $! > /tmp/dailyflora-preview.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/dailyFlora/ui-v1/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/dailyflora-preview.log
          exit 1

      - name: Capture desktop, mobile, and Special Edition safeguards
        shell: bash
        run: |
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          test -n "$CHROME"
          COMMON_FLAGS=(
            --headless=new
            --no-sandbox
            --disable-dev-shm-usage
            --hide-scrollbars
            --ignore-gpu-blocklist
            --enable-webgl
            --enable-unsafe-swiftshader
            --use-gl=swiftshader
            --run-all-compositor-stages-before-draw
            --virtual-time-budget=2200
          )
          "$CHROME" "${COMMON_FLAGS[@]}" --window-size=1440,1000 --screenshot=gui-v1-desktop.png "http://127.0.0.1:4173/dailyFlora/ui-v1/?date=2026-07-17&render=low&density=low"
          "$CHROME" "${COMMON_FLAGS[@]}" --window-size=390,844 --screenshot=gui-v1-mobile.png "http://127.0.0.1:4173/dailyFlora/ui-v1/?date=2026-07-17&render=low&density=low"
          "$CHROME" "${COMMON_FLAGS[@]}" --window-size=1440,1000 --screenshot=special-edition-safeguard.png "http://127.0.0.1:4173/dailyFlora/ui-v1-special/?special=ngc2787&render=low&density=low"
          test -s gui-v1-desktop.png
          test -s gui-v1-mobile.png
          test -s special-edition-safeguard.png

      - name: Upload validation captures and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dailyflora-gui-v1-validation
          path: |
            build.log
            gui-v1-desktop.png
            gui-v1-mobile.png
            special-edition-safeguard.png
            /tmp/dailyflora-preview.log
          if-no-files-found: warn
          retention-days: 7
