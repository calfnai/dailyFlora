name: Sync GUI documentation

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/gui-documentation-sync.yml

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update changelog and aesthetic handoff
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          section = '''## Unreleased - 2026-07-18

深化普通每日花束 GUI，同时冻结产品与特别版范围。 / Refined the standard daily-bouquet GUI while keeping product behavior and Special Edition frozen.

- 试用终端字体方向：本机优先 `Sarasa Term SC`，网页端以 `Iosevka Charon Mono` medium 承担拉丁/欧洲文字，并用 `SarasaUiSC-Regular` 承担中日韩回退；标题增加小幅横向扩展与纵向压缩，修正偏瘦、偏高。 / Trialed a terminal-led type system: local `Sarasa Term SC` first, `Iosevka Charon Mono` medium for web Latin/European text, and `SarasaUiSC-Regular` for CJK fallback; display titles receive a restrained width/height optical correction.
- 全局界面新增 `EN / 中 / ES / FR / IT / 日` 六种语言，首次访问默认英文；切换同步更新标题、品牌说明、INDEX、VIEW、菜单、日期、控制选项、tooltip、title 与 aria-label。 / Added six global GUI languages (`EN / 中 / ES / FR / IT / 日`) with English as the first-visit default; switching updates titles, brand metadata, INDEX, VIEW, menus, dates, controls, tooltips, titles, and ARIA labels.
- 中文继续使用已有中文花名，其余语言暂时复用已有英文花名，避免未经审校自动创造多语言花名。 / Kept the reviewed Chinese bouquet name in Chinese mode and reused the reviewed English name for other locales instead of inventing unreviewed translations.
- 恢复 `Today 6:46 AM` 版本的视口细框、左上 L 形装饰线和右下 L 形装饰线；不增加第三个装饰角，左下花名区不再套矩形。 / Restored the `Today 6:46 AM` viewport outline plus the top-left and bottom-right L-shaped accents, with no third corner and no extra rectangle around the lower-left title block.
- 保留右上 INDEX 与右下 VIEW 的独立矩形按钮框；菜单收藏 CTA 继续只用黄色文字和上分隔线。 / Preserved the framed INDEX and VIEW triggers while keeping the menu save CTA unboxed with only yellow text and a top divider.
- VIEW 展开区固定单行 `nowrap`；空间不足时横向滚动，不再因为西/法/意等翻译变长而折成两行。 / Kept the expanded VIEW controls on one `nowrap` row, using horizontal overflow rather than wrapping when localized labels need more width.
- 所有新 GUI 规则继续隔离在 `html.df-gui-v1`；Special Edition 的画面、文案、音频、花束数据、路由和原有图标保持不变。 / Kept all new GUI rules isolated behind `html.df-gui-v1`; Special Edition visuals, copy, audio, bouquet data, routing, and legacy icons remain unchanged.

'''
          marker = '## Unreleased - 2026-07-14\n'
          if '## Unreleased - 2026-07-18' not in text:
              text = text.replace(marker, section + marker, 1)
              changelog.write_text(text, encoding='utf-8')

          handoff = Path('docs/codex-aesthetic-handoff.md')
          text = handoff.read_text(encoding='utf-8')
          text = text.replace('最后更新：2026-07-13', '最后更新：2026-07-18', 1)
          gui_section = '''## 2026-07-18 GUI 方向确认

- 这轮只做普通每日花束 GUI 深化：不改产品逻辑、网站地图、路由、黑色基调、3D 花束主角层级，也不改 Special Edition。
- 参考分工固定为：Bureau Rouge 的克制与字体层级、21hrs 的黑色空间与科幻感、Depo Luxe 的节奏和留白；About 页面只参考空间与层级，不复制花形图标，也不把 serif/Times 式标题带回主观看页。
- 主 GUI 试用终端字体系统：本机优先 `Sarasa Term SC`；网页拉丁/欧洲文字回退为 `Iosevka Charon Mono` medium，中日韩回退为 `SarasaUiSC-Regular`。标题用 medium weight 和轻微横向扩展/纵向压缩，避免 Sarasa 偏瘦偏高。
- 全局语言为 `EN / 中 / ES / FR / IT / 日`，首次访问默认英文，选择保存在 `dailyflora.gui-language.v4`。切换必须覆盖整个 GUI，不只是花名。
- 中文模式显示已有中文花名；其他语言暂时使用已有英文花名，未经审校不要自动创造西班牙语、法语、意大利语或日语花名。
- 必须保留 `Today 6:46 AM` 版本的极淡视口完整框、左上 L 形装饰线、右下 L 形装饰线；不增加第三角。左下花名区只保留信息竖线，不套额外矩形。
- 右上 INDEX 和右下 VIEW 的独立矩形按钮框保留。菜单收藏 CTA 不套矩形，只使用黄色文字与上分隔线。
- INDEX 使用近乎不透明的右侧抽屉，避免文字与 3D 花束重叠。VIEW 控件必须保持单行 `nowrap`，宽度不足时横向滚动，禁止因为翻译而折成双行。
- 所有 GUI 规则必须在 `html.df-gui-v1` 下隔离；Special Edition 不启用该 class，并保留原来的菜单与观看图标。
- 详细执行记忆见 `docs/dailyflora-gui-handoff.md`。

'''
          marker = '## 当前审美判断\n'
          if '## 2026-07-18 GUI 方向确认' not in text:
              text = text.replace(marker, gui_section + marker, 1)
          handoff.write_text(text, encoding='utf-8')
          PY

          rm .github/workflows/gui-documentation-sync.yml
          git config user.name "DailyFlora GUI Sync"
          git config user.email "actions@users.noreply.github.com"
          git add CHANGELOG.md docs/codex-aesthetic-handoff.md .github/workflows/gui-documentation-sync.yml
          git commit -m "Document GUI language, type, and frame rules"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
