name: GUI v6 state dump

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/gui-v6-state-dump.yml

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Serve preview
        run: |
          git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages
          git worktree add --detach /tmp/pages refs/remotes/origin/gh-pages
          rm -rf /tmp/pages/ui-v6-special
          cp -a /tmp/pages/ui-v1 /tmp/pages/ui-v6-special
          sed -i 's/<html lang="en" class="df-gui-v1" data-language="en">/<html lang="en">/' /tmp/pages/ui-v6-special/index.html
          mkdir -p /tmp/site
          ln -s /tmp/pages /tmp/site/dailyFlora
          python3 -m http.server 4173 --directory /tmp/site >/tmp/state-server.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/dailyFlora/ui-v1/ >/dev/null && exit 0; sleep 1; done
          exit 1
      - name: Install browser
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          python3 -m venv /tmp/sel
          /tmp/sel/bin/pip install --quiet 'selenium>=4.20,<5'
      - name: Dump all states
        run: |
          /tmp/sel/bin/python - <<'PY'
          import json,time,traceback
          from pathlib import Path
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          report={}
          try:
              o=webdriver.ChromeOptions()
              for a in ('--headless=new','--no-sandbox','--disable-dev-shm-usage','--hide-scrollbars','--enable-webgl','--enable-unsafe-swiftshader','--use-gl=swiftshader'):o.add_argument(a)
              d=webdriver.Chrome(options=o);w=WebDriverWait(d,25)
              def ready(seconds=4):
                  w.until(lambda x:x.execute_script("return typeof window.__dailyFloraAudit==='function'"))
                  d.execute_async_script("const done=arguments[0];document.fonts.ready.then(()=>done(true)).catch(()=>done(false));")
                  time.sleep(seconds)
                  d.execute_script("document.querySelector('#hud')?.classList.remove('is-hidden');document.querySelector('#controls')?.classList.remove('is-hidden')")
              url='http://127.0.0.1:4173/dailyFlora/ui-v1/?date=2026-07-17&render=low&density=medium'
              d.set_window_size(1440,1000);d.get(url);ready(5)
              d.execute_script("localStorage.removeItem('dailyflora.gui-language.v4');location.reload()");ready(5)
              report['default']=d.execute_script("""
                const f=document.querySelector('.interface-frame'),s=getComputedStyle(f),b=getComputedStyle(f,'::before'),a=getComputedStyle(f,'::after');
                return {language:document.documentElement.dataset.language,buttons:[...document.querySelectorAll('[data-language-choice]')].map(x=>x.textContent.trim()),fontFaces:[...document.fonts].map(x=>({family:x.family,status:x.status,weight:x.weight})),fontChecks:{latin:document.fonts.check('500 32px "Iosevka Charon Mono"','DAILYFLORA É Í Ñ'),cjk:document.fonts.check('400 16px "SarasaUiSC-Regular"','中文日本語')},titleFont:getComputedStyle(document.querySelector('.daily-theme-en')).fontFamily,titleWeight:getComputedStyle(document.querySelector('.daily-theme-en')).fontWeight,frame:{display:s.display,borders:[s.borderTopWidth,s.borderRightWidth,s.borderBottomWidth,s.borderLeftWidth],before:[b.borderTopWidth,b.borderLeftWidth],after:[a.borderRightWidth,a.borderBottomWidth]}};
              """)
              d.save_screenshot('state-default.png')
              report['languages']={}
              for lang in ('en','zh','es','fr','it','ja'):
                  d.find_element(By.CSS_SELECTOR,f'[data-language-choice="{lang}"]').click();time.sleep(.35)
                  state=d.execute_script("return {language:document.documentElement.dataset.language,rootLang:document.documentElement.lang,index:document.querySelector('[data-ui-key=index]').textContent,view:document.querySelector('[data-ui-key=view]').textContent,titleCn:getComputedStyle(document.querySelector('.daily-theme-cn')).display,titleEn:getComputedStyle(document.querySelector('.daily-theme-en')).display,menuText:[...document.querySelectorAll('#site-menu-panel [data-ui-key]')].map(x=>x.textContent)}")
                  d.find_element(By.ID,'controls-toggle').click();time.sleep(.3)
                  state['viewPanel']=d.execute_script("const p=document.querySelector('#controls-panel'),s=getComputedStyle(p),tops=[...p.children].map(e=>Math.round(e.getBoundingClientRect().top));return {hidden:p.hidden,display:s.display,wrap:s.flexWrap,whiteSpace:s.whiteSpace,clientHeight:p.clientHeight,scrollHeight:p.scrollHeight,clientWidth:p.clientWidth,scrollWidth:p.scrollWidth,tops:[...new Set(tops)],codes:[...p.querySelectorAll('.segment-button')].map(x=>x.textContent.trim())}")
                  report['languages'][lang]=state
                  d.find_element(By.ID,'controls-toggle').click();time.sleep(.15)
              d.find_element(By.CSS_SELECTOR,'[data-language-choice="es"]').click();time.sleep(.2);d.find_element(By.ID,'controls-toggle').click();time.sleep(.3);d.save_screenshot('state-es-view.png')
              d.set_window_size(390,844);d.get(url);ready(6)
              report['mobile']=d.execute_script("""
                const l=document.querySelector('.global-language-toggle').getBoundingClientRect(),i=document.querySelector('#site-menu-toggle').getBoundingClientRect();return {language:{left:l.left,right:l.right,top:l.top,bottom:l.bottom},index:{left:i.left,right:i.right,top:i.top,bottom:i.bottom},overlap:!(l.right<=i.left||l.left>=i.right||l.bottom<=i.top||l.top>=i.bottom)};
              """)
              d.find_element(By.ID,'controls-toggle').click();time.sleep(.3)
              report['mobileView']=d.execute_script("const p=document.querySelector('#controls-panel'),s=getComputedStyle(p),tops=[...p.children].map(e=>Math.round(e.getBoundingClientRect().top));return {wrap:s.flexWrap,clientHeight:p.clientHeight,scrollHeight:p.scrollHeight,clientWidth:p.clientWidth,scrollWidth:p.scrollWidth,tops:[...new Set(tops)]}")
              d.save_screenshot('state-mobile.png')
              d.set_window_size(1440,1000);d.get('http://127.0.0.1:4173/dailyFlora/ui-v6-special/?special=ngc2787&render=low&density=low');ready(4)
              report['special']=d.execute_script("return {gui:document.documentElement.classList.contains('df-gui-v1'),frame:getComputedStyle(document.querySelector('.interface-frame')).display,language:getComputedStyle(document.querySelector('.global-language-toggle')).display,menu:getComputedStyle(document.querySelector('.site-menu-legacy-icon')).display,view:getComputedStyle(document.querySelector('.controls-legacy-icon')).display}")
              d.save_screenshot('state-special.png')
              d.quit()
          except Exception as e:
              report['error']=repr(e)
              report['traceback']=traceback.format_exc()
          Path('gui-v6-state-dump.json').write_text(json.dumps(report,indent=2,ensure_ascii=False),encoding='utf-8')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dailyflora-gui-v6-state-dump
          path: |
            state-default.png
            state-es-view.png
            state-mobile.png
            state-special.png
            gui-v6-state-dump.json
            /tmp/state-server.log
          retention-days: 3
          if-no-files-found: warn
