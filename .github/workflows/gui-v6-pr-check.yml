name: GUI v6 PR check

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - src/gui-v2.js
      - src/gui-v5-frame-restore.css
      - src/gui-v6-sarasa-i18n-frame.css
      - src/gui-v7-font-load.css
      - .github/workflows/gui-v6-pr-check.yml

permissions:
  contents: read

jobs:
  browser-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Prepare current Pages preview
        shell: bash
        run: |
          git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages
          git worktree add --detach /tmp/dailyflora-pages refs/remotes/origin/gh-pages
          rm -rf /tmp/dailyflora-pages/ui-v6-special
          cp -a /tmp/dailyflora-pages/ui-v1 /tmp/dailyflora-pages/ui-v6-special
          sed -i 's/<html lang="en" class="df-gui-v1" data-language="en">/<html lang="en">/' /tmp/dailyflora-pages/ui-v6-special/index.html
          mkdir -p /tmp/site
          ln -s /tmp/dailyflora-pages /tmp/site/dailyFlora
          python3 -m http.server 4173 --directory /tmp/site > /tmp/gui-v6-server.log 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/dailyFlora/ui-v1/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/gui-v6-server.log
          exit 1

      - name: Install Selenium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          python3 -m venv /tmp/selenium
          /tmp/selenium/bin/pip install --quiet 'selenium>=4.20,<5'

      - name: Validate GUI
        run: |
          /tmp/selenium/bin/python - <<'PY'
          import json, time
          from pathlib import Path
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait

          base = 'http://127.0.0.1:4173/dailyFlora'
          normal = base + '/ui-v1/?date=2026-07-17&render=low&density=medium'
          special = base + '/ui-v6-special/?special=ngc2787&render=low&density=low'
          options = webdriver.ChromeOptions()
          for arg in ('--headless=new','--no-sandbox','--disable-dev-shm-usage','--hide-scrollbars','--enable-webgl','--enable-unsafe-swiftshader','--use-gl=swiftshader'):
              options.add_argument(arg)
          driver = webdriver.Chrome(options=options)
          wait = WebDriverWait(driver, 25)

          def ready(seconds=4):
              wait.until(lambda d: d.execute_script('return document.readyState') == 'complete')
              wait.until(lambda d: d.execute_script("return typeof window.__dailyFloraAudit === 'function'"))
              driver.execute_async_script("const done=arguments[0]; document.fonts.ready.then(()=>done(true)).catch(()=>done(false));")
              time.sleep(seconds)
              driver.execute_script("document.querySelector('#hud')?.classList.remove('is-hidden');document.querySelector('#controls')?.classList.remove('is-hidden');")

          report = {}
          driver.set_window_size(1440, 1000)
          driver.get(normal)
          ready(5)
          driver.execute_script("localStorage.removeItem('dailyflora.gui-language.v4');location.reload();")
          ready(5)

          report['default'] = driver.execute_script('return document.documentElement.dataset.language')
          report['buttons'] = driver.execute_script("return [...document.querySelectorAll('[data-language-choice]')].map(b=>b.textContent.trim())")
          report['fontFaces'] = driver.execute_script("return [...document.fonts].map(f=>({family:f.family,status:f.status,weight:f.weight}))")
          report['fontChecks'] = driver.execute_script("""
            return {
              latin: document.fonts.check('500 32px "Iosevka Charon Mono"', 'DAILYFLORA É Í Ñ'),
              cjk: document.fonts.check('400 16px "SarasaUiSC-Regular"', '中文日本語')
            };
          """)
          report['titleFont'] = driver.execute_script("return getComputedStyle(document.querySelector('.daily-theme-en')).fontFamily")
          report['titleWeight'] = driver.execute_script("return getComputedStyle(document.querySelector('.daily-theme-en')).fontWeight")
          report['frame'] = driver.execute_script("""
            const f=document.querySelector('.interface-frame'),s=getComputedStyle(f),b=getComputedStyle(f,'::before'),a=getComputedStyle(f,'::after');
            return {display:s.display,borders:[s.borderTopWidth,s.borderRightWidth,s.borderBottomWidth,s.borderLeftWidth],before:[b.borderTopWidth,b.borderLeftWidth],after:[a.borderRightWidth,a.borderBottomWidth]};
          """)
          assert report['default'] == 'en', report
          assert report['buttons'] == ['EN','中','ES','FR','IT','日'], report
          assert report['frame']['display'] == 'block', report
          assert all(v != '0px' for v in report['frame']['borders'] + report['frame']['before'] + report['frame']['after']), report
          assert report['fontChecks']['latin'] and report['fontChecks']['cjk'], report
          assert 'Iosevka Charon Mono' in report['titleFont'], report
          assert report['titleWeight'] == '500', report
          driver.save_screenshot('gui-v6-en-frame.png')

          expected={'en':('INDEX','VIEW'),'zh':('目录','观看'),'es':('ÍNDICE','VISTA'),'fr':('INDEX','VUE'),'it':('INDICE','VISTA'),'ja':('目次','表示')}
          report['languages']={}
          for lang, labels in expected.items():
              driver.find_element(By.CSS_SELECTOR,f'[data-language-choice="{lang}"]').click(); time.sleep(.25)
              state=driver.execute_script("return {lang:document.documentElement.dataset.language,index:document.querySelector('[data-ui-key=index]').textContent,view:document.querySelector('[data-ui-key=view]').textContent,cn:getComputedStyle(document.querySelector('.daily-theme-cn')).display,en:getComputedStyle(document.querySelector('.daily-theme-en')).display}")
              assert state['lang']==lang and (state['index'],state['view'])==labels,(lang,state)
              assert (state['cn']!='none' and state['en']=='none') if lang=='zh' else (state['cn']=='none' and state['en']!='none'),(lang,state)
              driver.find_element(By.ID,'controls-toggle').click(); time.sleep(.25)
              view=driver.execute_script("""
                const p=document.querySelector('#controls-panel'),s=getComputedStyle(p),tops=[...p.children].map(e=>Math.round(e.getBoundingClientRect().top));
                return {wrap:s.flexWrap,clientHeight:p.clientHeight,scrollHeight:p.scrollHeight,tops:[...new Set(tops)],scrollWidth:p.scrollWidth,clientWidth:p.clientWidth};
              """)
              assert view['wrap']=='nowrap' and view['scrollHeight']<=view['clientHeight']+4 and len(view['tops'])==1,(lang,view)
              report['languages'][lang]={'copy':state,'view':view}
              driver.find_element(By.ID,'controls-toggle').click(); time.sleep(.1)

          driver.find_element(By.CSS_SELECTOR,'[data-language-choice="es"]').click(); time.sleep(.2)
          driver.find_element(By.ID,'controls-toggle').click(); time.sleep(.25)
          driver.save_screenshot('gui-v6-es-view.png')

          driver.set_window_size(390,844)
          driver.get(normal); ready(6)
          report['mobileOverlap']=driver.execute_script("""
            const a=document.querySelector('.global-language-toggle').getBoundingClientRect(),b=document.querySelector('#site-menu-toggle').getBoundingClientRect();
            return !(a.right<=b.left||a.left>=b.right||a.bottom<=b.top||a.top>=b.bottom);
          """)
          assert not report['mobileOverlap'],report
          driver.find_element(By.ID,'controls-toggle').click();time.sleep(.25)
          report['mobileView']=driver.execute_script("const p=document.querySelector('#controls-panel'),s=getComputedStyle(p);return {wrap:s.flexWrap,clientHeight:p.clientHeight,scrollHeight:p.scrollHeight}")
          assert report['mobileView']['wrap']=='nowrap' and report['mobileView']['scrollHeight']<=report['mobileView']['clientHeight']+4,report
          driver.save_screenshot('gui-v6-mobile.png')

          driver.set_window_size(1440,1000)
          driver.get(special); ready(4)
          report['special']=driver.execute_script("return {gui:document.documentElement.classList.contains('df-gui-v1'),frame:getComputedStyle(document.querySelector('.interface-frame')).display,language:getComputedStyle(document.querySelector('.global-language-toggle')).display,menu:getComputedStyle(document.querySelector('.site-menu-legacy-icon')).display,view:getComputedStyle(document.querySelector('.controls-legacy-icon')).display}")
          assert not report['special']['gui'] and report['special']['frame']=='none' and report['special']['language']=='none',report
          assert report['special']['menu']!='none' and report['special']['view']!='none',report
          driver.save_screenshot('gui-v6-special.png')
          Path('gui-v6-pr-check.json').write_text(json.dumps(report,indent=2,ensure_ascii=False),encoding='utf-8')
          driver.quit()
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dailyflora-gui-v6-pr-check
          path: |
            gui-v6-en-frame.png
            gui-v6-es-view.png
            gui-v6-mobile.png
            gui-v6-special.png
            gui-v6-pr-check.json
            /tmp/gui-v6-server.log
          retention-days: 7
          if-no-files-found: warn
