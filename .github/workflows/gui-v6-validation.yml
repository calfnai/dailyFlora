name: GUI v6 validation

on:
  push:
    branches:
      - agent/gui-dark-editorial-v1
    paths:
      - index.html
      - src/gui-v1-safety.css
      - src/gui-v2.js
      - src/gui-v3-corrections.css
      - src/gui-v5-frame-restore.css
      - src/gui-v6-sarasa-i18n-frame.css
      - .github/workflows/gui-v6-validation.yml

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Prepare isolated preview
        shell: bash
        run: |
          git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages
          git worktree add --detach /tmp/dailyflora-gh-pages refs/remotes/origin/gh-pages
          rm -rf /tmp/dailyflora-gh-pages/ui-v6-special
          cp -a /tmp/dailyflora-gh-pages/ui-v1 /tmp/dailyflora-gh-pages/ui-v6-special
          sed -i 's/<html lang="en" class="df-gui-v1" data-language="en">/<html lang="en">/' /tmp/dailyflora-gh-pages/ui-v6-special/index.html
          mkdir -p /tmp/dailyflora-site-root
          ln -s /tmp/dailyflora-gh-pages /tmp/dailyflora-site-root/dailyFlora

      - name: Start preview server
        run: |
          python3 -m http.server 4173 --directory /tmp/dailyflora-site-root > /tmp/dailyflora-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/dailyFlora/ui-v1/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/dailyflora-preview.log
          exit 1

      - name: Install browser validation dependencies
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          python3 -m venv /tmp/dailyflora-selenium
          /tmp/dailyflora-selenium/bin/pip install --quiet 'selenium>=4.20,<5'

      - name: Validate six locales, Sarasa trial, corner frame, and nowrap VIEW
        shell: bash
        run: |
          /tmp/dailyflora-selenium/bin/python - <<'PY'
          import json
          import time
          from pathlib import Path
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait

          base = 'http://127.0.0.1:4173/dailyFlora'
          normal_url = f'{base}/ui-v1/?date=2026-07-17&render=low&density=medium'
          special_url = f'{base}/ui-v6-special/?special=ngc2787&render=low&density=low'

          options = webdriver.ChromeOptions()
          for argument in (
              '--headless=new', '--no-sandbox', '--disable-dev-shm-usage',
              '--hide-scrollbars', '--ignore-gpu-blocklist', '--enable-webgl',
              '--enable-unsafe-swiftshader', '--use-gl=swiftshader', '--lang=en-US',
          ):
              options.add_argument(argument)

          driver = webdriver.Chrome(options=options)
          wait = WebDriverWait(driver, 25)

          def wait_for_scene(seconds=5):
              wait.until(lambda current: current.execute_script('return document.readyState') == 'complete')
              wait.until(lambda current: current.execute_script("return typeof window.__dailyFloraAudit === 'function'"))
              driver.execute_async_script("""
                const done = arguments[0];
                document.fonts.ready.then(() => done(true)).catch(() => done(false));
              """)
              time.sleep(seconds)

          def reveal_ui():
              driver.execute_script("""
                document.querySelector('#hud')?.classList.remove('is-hidden');
                document.querySelector('#controls')?.classList.remove('is-hidden');
              """)
              time.sleep(.2)

          def frame_state():
              return driver.execute_script("""
                const frame = document.querySelector('.interface-frame');
                const style = getComputedStyle(frame);
                const before = getComputedStyle(frame, '::before');
                const after = getComputedStyle(frame, '::after');
                return {
                  display: style.display,
                  borderTop: style.borderTopWidth,
                  borderRight: style.borderRightWidth,
                  borderBottom: style.borderBottomWidth,
                  borderLeft: style.borderLeftWidth,
                  inset: [frame.getBoundingClientRect().top, frame.getBoundingClientRect().left,
                          innerWidth - frame.getBoundingClientRect().right,
                          innerHeight - frame.getBoundingClientRect().bottom],
                  before: [before.borderTopWidth, before.borderLeftWidth, before.width, before.height],
                  after: [after.borderRightWidth, after.borderBottomWidth, after.width, after.height],
                };
              """)

          def view_state():
              return driver.execute_script("""
                const panel = document.querySelector('#controls-panel');
                const style = getComputedStyle(panel);
                const tops = [...panel.children].map(el => Math.round(el.getBoundingClientRect().top));
                return {
                  hidden: panel.hidden,
                  display: style.display,
                  flexWrap: style.flexWrap,
                  whiteSpace: style.whiteSpace,
                  clientHeight: panel.clientHeight,
                  scrollHeight: panel.scrollHeight,
                  clientWidth: panel.clientWidth,
                  scrollWidth: panel.scrollWidth,
                  distinctTops: [...new Set(tops)],
                };
              """)

          expected = {
              'en': ('INDEX', 'VIEW'),
              'zh': ('目录', '观看'),
              'es': ('ÍNDICE', 'VISTA'),
              'fr': ('INDEX', 'VUE'),
              'it': ('INDICE', 'VISTA'),
              'ja': ('目次', '表示'),
          }

          report = {}
          driver.set_window_size(1440, 1000)
          driver.get(normal_url)
          wait_for_scene(6)
          driver.execute_script("localStorage.removeItem('dailyflora.gui-language.v4'); location.reload();")
          wait_for_scene(6)
          reveal_ui()

          report['defaultLanguage'] = driver.execute_script('return document.documentElement.dataset.language')
          report['languageButtons'] = driver.execute_script("return [...document.querySelectorAll('[data-language-choice]')].map(b => b.textContent.trim())")
          report['frame'] = frame_state()
          report['fontFamilies'] = driver.execute_script("return [...document.fonts].map(face => face.family).filter((v,i,a) => a.indexOf(v) === i)")
          report['sarasaLoaded'] = driver.execute_script("return [...document.fonts].some(face => /Sarasa/i.test(face.family) && face.status === 'loaded')")
          report['titleFont'] = driver.execute_script("return getComputedStyle(document.querySelector('.daily-theme-en')).fontFamily")

          assert report['defaultLanguage'] == 'en', report
          assert report['languageButtons'] == ['EN', '中', 'ES', 'FR', 'IT', '日'], report
          assert report['frame']['display'] == 'block', report
          assert report['frame']['borderTop'] != '0px' and report['frame']['borderRight'] != '0px', report
          assert report['frame']['borderBottom'] != '0px' and report['frame']['borderLeft'] != '0px', report
          assert report['frame']['before'][0] != '0px' and report['frame']['before'][1] != '0px', report
          assert report['frame']['after'][0] != '0px' and report['frame']['after'][1] != '0px', report
          assert report['sarasaLoaded'], report
          assert 'Sarasa' in report['titleFont'], report
          driver.save_screenshot('gui-v6-english-default-frame.png')

          report['locales'] = {}
          for language, labels in expected.items():
              driver.find_element(By.CSS_SELECTOR, f'[data-language-choice="{language}"]').click()
              time.sleep(.3)
              reveal_ui()
              state = driver.execute_script("""
                return {
                  language: document.documentElement.dataset.language,
                  rootLang: document.documentElement.lang,
                  index: document.querySelector('[data-ui-key="index"]').textContent,
                  view: document.querySelector('[data-ui-key="view"]').textContent,
                  titleCn: getComputedStyle(document.querySelector('.daily-theme-cn')).display,
                  titleEn: getComputedStyle(document.querySelector('.daily-theme-en')).display,
                };
              """)
              assert state['language'] == language, (language, state)
              assert (state['index'], state['view']) == labels, (language, state)
              if language == 'zh':
                  assert state['titleCn'] != 'none' and state['titleEn'] == 'none', (language, state)
              else:
                  assert state['titleCn'] == 'none' and state['titleEn'] != 'none', (language, state)

              driver.find_element(By.ID, 'controls-toggle').click()
              wait.until(lambda current: not current.find_element(By.ID, 'controls-panel').get_attribute('hidden'))
              time.sleep(.25)
              view = view_state()
              assert view['flexWrap'] == 'nowrap', (language, view)
              assert view['scrollHeight'] <= view['clientHeight'] + 4, (language, view)
              assert len(view['distinctTops']) == 1, (language, view)
              state['viewPanel'] = view
              report['locales'][language] = state
              driver.find_element(By.ID, 'controls-toggle').click()
              time.sleep(.15)

          driver.find_element(By.CSS_SELECTOR, '[data-language-choice="ja"]').click()
          reveal_ui()
          driver.save_screenshot('gui-v6-japanese.png')
          driver.find_element(By.CSS_SELECTOR, '[data-language-choice="es"]').click()
          reveal_ui()
          driver.find_element(By.ID, 'controls-toggle').click()
          time.sleep(.3)
          driver.save_screenshot('gui-v6-spanish-view-nowrap.png')

          driver.set_window_size(390, 844)
          driver.get(normal_url)
          wait_for_scene(7)
          reveal_ui()
          report['mobile'] = driver.execute_script("""
            const language = document.querySelector('.global-language-toggle').getBoundingClientRect();
            const index = document.querySelector('#site-menu-toggle').getBoundingClientRect();
            return {
              language: {left:language.left, right:language.right, top:language.top, bottom:language.bottom},
              index: {left:index.left, right:index.right, top:index.top, bottom:index.bottom},
              overlap: !(language.right <= index.left || language.left >= index.right || language.bottom <= index.top || language.top >= index.bottom),
            };
          """)
          assert not report['mobile']['overlap'], report['mobile']
          driver.find_element(By.ID, 'controls-toggle').click()
          time.sleep(.3)
          report['mobileView'] = view_state()
          assert report['mobileView']['flexWrap'] == 'nowrap', report['mobileView']
          assert report['mobileView']['scrollHeight'] <= report['mobileView']['clientHeight'] + 4, report['mobileView']
          driver.save_screenshot('gui-v6-mobile-view-nowrap.png')

          driver.set_window_size(1440, 1000)
          driver.get(special_url)
          wait_for_scene(4)
          report['special'] = driver.execute_script("""
            return {
              guiClass: document.documentElement.classList.contains('df-gui-v1'),
              frame: getComputedStyle(document.querySelector('.interface-frame')).display,
              language: getComputedStyle(document.querySelector('.global-language-toggle')).display,
              menuLegacy: getComputedStyle(document.querySelector('.site-menu-legacy-icon')).display,
              controlsLegacy: getComputedStyle(document.querySelector('.controls-legacy-icon')).display,
            };
          """)
          assert report['special']['guiClass'] is False, report
          assert report['special']['frame'] == 'none', report
          assert report['special']['language'] == 'none', report
          assert report['special']['menuLegacy'] != 'none', report
          assert report['special']['controlsLegacy'] != 'none', report
          driver.save_screenshot('gui-v6-special-unchanged.png')

          Path('gui-v6-validation.json').write_text(json.dumps(report, indent=2, ensure_ascii=False), encoding='utf-8')
          driver.quit()
          PY

      - name: Upload validation captures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dailyflora-gui-v6-validation
          path: |
            gui-v6-english-default-frame.png
            gui-v6-japanese.png
            gui-v6-spanish-view-nowrap.png
            gui-v6-mobile-view-nowrap.png
            gui-v6-special-unchanged.png
            gui-v6-validation.json
            /tmp/dailyflora-preview.log
          if-no-files-found: warn
          retention-days: 7
