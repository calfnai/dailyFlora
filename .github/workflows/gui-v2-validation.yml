name: GUI v2 validation

on:
  pull_request:
    branches:
      - main
    paths:
      - index.html
      - src/gui-v1-safety.css
      - src/gui-v2.css
      - src/gui-v2.js
      - .github/scripts/gui-v2-validate.cjs
      - .github/workflows/gui-v2-validation.yml

permissions:
  contents: read

jobs:
  browser-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install browser tools
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Wait for GitHub Pages preview
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS "https://calfnai.github.io/dailyFlora/ui-v1/gui-v2.js?attempt=${attempt}" | grep -q "dailyflora.gui-language.v1"; then
              exit 0
            fi
            sleep 5
          done
          echo "GUI v2 preview did not propagate" >&2
          exit 1

      - name: Validate interactions and capture states
        run: |
          mkdir -p validation
          set +e
          node .github/scripts/gui-v2-validate.cjs 2>&1 | tee validation/validation.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload captures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dailyflora-gui-v2-validation
          path: validation
          if-no-files-found: error
          retention-days: 7
