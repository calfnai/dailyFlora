name: GUI v6 diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/gui-v6-diagnostic.yml

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: Serve Pages preview
        run: |
          git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages
          git worktree add --detach /tmp/pages refs/remotes/origin/gh-pages
          mkdir -p /tmp/site
          ln -s /tmp/pages /tmp/site/dailyFlora
          python3 -m http.server 4173 --directory /tmp/site >/tmp/server.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/dailyFlora/ui-v1/ >/dev/null && exit 0; sleep 1; done
          exit 1
      - name: Install browser
        run: |
          python3 -m venv /tmp/sel
          /tmp/sel/bin/pip install --quiet 'selenium>=4.20,<5'
      - name: Capture computed state
        run: |
          /tmp/sel/bin/python - <<'PY'
          import json,time
          from pathlib import Path
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          o=webdriver.ChromeOptions()
          for a in ('--headless=new','--no-sandbox','--disable-dev-shm-usage','--hide-scrollbars','--enable-webgl','--enable-unsafe-swiftshader','--use-gl=swiftshader'):o.add_argument(a)
          d=webdriver.Chrome(options=o);d.set_window_size(1440,1000)
          d.get('http://127.0.0.1:4173/dailyFlora/ui-v1/?date=2026-07-17&render=low&density=medium')
          w=WebDriverWait(d,25);w.until(lambda x:x.execute_script("return typeof window.__dailyFloraAudit==='function'"));time.sleep(7)
          d.execute_script("localStorage.removeItem('dailyflora.gui-language.v4');location.reload()")
          w.until(lambda x:x.execute_script("return typeof window.__dailyFloraAudit==='function'"));time.sleep(7)
          d.execute_script("document.querySelector('#hud')?.classList.remove('is-hidden');document.querySelector('#controls')?.classList.remove('is-hidden')")
          report=d.execute_script("""
            const f=document.querySelector('.interface-frame'),s=getComputedStyle(f),b=getComputedStyle(f,'::before'),a=getComputedStyle(f,'::after');
            return {
              lang:document.documentElement.dataset.language,
              buttons:[...document.querySelectorAll('[data-language-choice]')].map(x=>x.textContent.trim()),
              stylesheets:[...document.styleSheets].map(x=>x.href),
              fonts:[...document.fonts].map(x=>({family:x.family,status:x.status,weight:x.weight,style:x.style})),
              titleFont:getComputedStyle(document.querySelector('.daily-theme-en')).fontFamily,
              titleWeight:getComputedStyle(document.querySelector('.daily-theme-en')).fontWeight,
              frame:{display:s.display,borders:[s.borderTopWidth,s.borderRightWidth,s.borderBottomWidth,s.borderLeftWidth],before:[b.borderTopWidth,b.borderLeftWidth,b.width,b.height],after:[a.borderRightWidth,a.borderBottomWidth,a.width,a.height]},
              consoleReady:typeof window.__dailyFloraAudit,
            };
          """)
          d.save_screenshot('gui-v6-diagnostic.png')
          d.find_element(By.ID,'controls-toggle').click();time.sleep(.4)
          report['view']=d.execute_script("const p=document.querySelector('#controls-panel'),s=getComputedStyle(p);return {display:s.display,wrap:s.flexWrap,whiteSpace:s.whiteSpace,clientHeight:p.clientHeight,scrollHeight:p.scrollHeight,clientWidth:p.clientWidth,scrollWidth:p.scrollWidth,tops:[...new Set([...p.children].map(e=>Math.round(e.getBoundingClientRect().top)))]}")
          d.save_screenshot('gui-v6-diagnostic-view.png')
          Path('gui-v6-diagnostic.json').write_text(json.dumps(report,indent=2,ensure_ascii=False),encoding='utf-8')
          d.quit()
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dailyflora-gui-v6-diagnostic
          path: |
            gui-v6-diagnostic.png
            gui-v6-diagnostic-view.png
            gui-v6-diagnostic.json
            /tmp/server.log
          retention-days: 7
